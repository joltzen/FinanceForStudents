name: Deploy to Firebase Hosting
on:
  push:
    branches: [main]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install & Build
        run: npm ci --legacy-peer-deps && npm run build
        working-directory: client
      - name: Deploy
        run: npx firebase-tools deploy --only hosting --token ${{ secrets.FIREBASE_TOKEN }} --project fiananceforstudents
